name: Update 13F Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 12 * 2,5,8,11 1-5"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-13f-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and update SEC 13F data
        run: python scripts/update_data.py --max-attempts 3

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Print data summary
        run: python scripts/print_data_summary.py

      - name: Commit data changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Berkshire 13F data"
          file_pattern: public/data/*.json

      - name: Deploy updated data
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref main
